<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Etch-A-Sketch</title>
  </head>
  <body>
    <main class="grid">
      <nav class="grid-nav">
        <h1 class="grid-title">Etch-A-Sketch</h1>
        <button class="start btn">Start</button>
        <button class="reset btn">Reset</button>
        <button class="black btn">Black</button>
        <button class="white btn">White</button>
        <button class="random btn">Random</button>
        <button class="percent btn">10% Black</button>
      </nav>
      <figure id="grid-container"></figure>
    </main>
  </body>
</html>
